<!doctype html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Özcan Kitap Evi · Profesyonel Sistem</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Video Temasına Uygun Renk Paleti */
        :root { 
            --primary-color: #5d4037; /* Sıcak Kahve */
            --accent-color: #8d6e63;  /* Toprak Tonu */
            --bg-overlay: rgba(253, 250, 247, 0.94); 
            --sidebar-color: #3e2723; /* Koyu Ahşap */
        }
        
        body { margin: 0; font-family: 'Metropolis', sans-serif; min-height: 100vh; overflow-x: hidden; background-color: var(--sidebar-color); }
        
        /* Video Arka Plan */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-bg video { min-width: 100%; min-height: 100%; object-fit: cover; filter: brightness(0.75); }

        /* Mağaza Tasarımı */
        #main-store { display: block; position: relative; z-index: 1; }
        .main-container { background-color: var(--bg-overlay); box-shadow: 0 0 50px rgba(0,0,0,0.4); min-height: 100vh; padding-bottom: 50px; }
        
        .navbar-dark { background-color: #2b1d1a !important; }
        .card-img-top { display: block; margin: 20px auto; max-width: 85%; max-height: 180px; object-fit: contain; }
        .store-card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; border-radius: 10px; background: #fff; }
        .store-card:hover { transform: translateY(-5px); }
        .price-text { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
        .product-title { font-family: 'Georgia', serif; font-weight: 700; height: 3rem; overflow: hidden; color: #3e2723; }

        /* Dashboard Checkout */
        .sidebar { background-color: var(--sidebar-color); min-height: 100vh; width: 250px; position: fixed; color: white; padding: 1.5rem; z-index: 100; }
        .checkout-content { margin-left: 250px; background-color: #fcf8f5; min-height: 100vh; padding: 2rem; }
        .pay-card { cursor: pointer; border: 1px solid #d7ccc8; border-radius: 10px; padding: 20px; text-align: center; transition: 0.2s; }
        .pay-card.active { border: 2px solid var(--primary-color); background: white; color: var(--primary-color); }
        .method-details { display: none; }
        .method-details.active { display: block; }
        .total-box-red { border: 2px solid var(--primary-color); border-radius: 5px; padding: 20px; background: white; }

        /* Auth Sayfası */
        .auth-bg { background-color: rgba(62, 39, 35, 0.85); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: none; border-radius: 0.35rem; overflow: hidden; background: #fff; width: 100%; max-width: 1000px; box-shadow: 0 1rem 3rem rgba(0,0,0,0.5); }
        .auth-image-side { background: url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=800&q=80') center/cover; min-height: 500px; }
        .form-control-user { border-radius: 10rem; padding: 1.5rem 1rem; font-size: 0.8rem; border: 1px solid #d7ccc8; }
        .btn-user { border-radius: 10rem; padding: 0.75rem; font-weight: bold; background-color: var(--primary-color); color: white; border: none; }
        .btn-user:hover { background-color: var(--sidebar-color); color: white; }
        .btn-google { background-color: #d32f2f; color: white; }
        .btn-facebook { background-color: #455a64; color: white; }

        #auth-page, #checkout-page { display: none; }
    </style>
</head>
<body onload="showPage('main')">

    <div class="video-bg">
        <video autoplay loop muted playsinline><source src="c:\Users\özcan\Downloads\coffee-book-and-rain.1920x1080.mp4" type="video/mp4"></video>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="liveToast" class="toast align-items-center text-white border-0 shadow" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div id="main-store">
        <div class="container main-container">
            <header data-bs-theme="dark">
                <div class="navbar navbar-dark shadow-sm rounded-bottom">
                    <div class="container">
                        <span class="navbar-brand d-flex align-items-center">
                            <i class="bi bi-book-half me-2" style="color: var(--accent-color)"></i> <strong>Özcan Kitap Evi</strong>
                        </span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-light btn-sm position-relative" onclick="showPage('checkout')">
                                <i class="bi bi-cart3 fs-5"></i>
                                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                            </button>
                            <button class="btn btn-outline-warning btn-sm fw-bold px-3" onclick="showPage('auth')">Çıkış Yap</button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="container py-5">
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                    <script>
                        const kitaplar = [
                            {ad: "Psikiyatrist - Pegasus", fiyat: 450, resim: "format_webp (2) - Kopya.jpg"},
                            {ad: "Anahtar Deliği - S. King", fiyat: 600, resim: "format_webp (3).jpg"},
                            {ad: "Fırtınada Yanacaksın", fiyat: 350, resim: "format_webp (4) - Kopya.jpg"},
                            {ad: "444 Basamak", fiyat: 1200, resim: "format_webp (5) - Kopya.jpg"},
                            {ad: "Kırmızı Piyano", fiyat: 850, resim: "format_webp (6) - Kopya.jpg"},
                            {ad: "Deli Sarayı - Labirent", fiyat: 500, resim: "format_webp (7) - Kopya.jpg"},
                            {ad: "22/11/63 - S. King", fiyat: 750, resim: "format_webp (8) - Kopya.jpg"},
                            {ad: "Mefisto Kulübü", fiyat: 900, resim: "format_webp - Kopya.jpg"},
                            {ad: "Cehennemdere Kanyonu", fiyat: 150, resim: "format_webp (1) - Kopya.jpg"}
                        ];
                        kitaplar.forEach(k => {
                            document.write(`
                            <div class="col">
                                <div class="card h-100 text-center store-card">
                                    <img src="${k.resim}" class="card-img-top">
                                    <div class="card-body d-flex flex-column">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <span class="price-text">${k.fiyat} TL</span>
                                            <button class="btn border-0 text-danger fs-4 p-0" onclick="toggleFav(this)"><i class="bi bi-heart"></i></button>
                                        </div>
                                        <h6 class="product-title">${k.ad}</h6>
                                        <div class="mt-auto btn-group w-100">
                                            <button class="btn btn-sm btn-outline-secondary" style="color:var(--primary-color); border-color:var(--primary-color)">İncele</button>
                                            <button class="btn btn-success btn-sm" style="background-color:var(--primary-color); border:none" onclick="addToCart(${k.fiyat})">Satın Al</button>
                                        </div>
                                    </div>
                                </div>
                            </div>`);
                        });
                    </script>
                </div>
            </main>
        </div>
    </div>

    <div id="checkout-page">
        <div class="sidebar shadow">
            <h4 class="mb-4 text-center fw-bold">Özcan Panel</h4>
            <hr class="opacity-25">
            <button class="btn btn-outline-light btn-sm w-100 mb-3" onclick="showPage('main')">Mağazaya Dön</button>
        </div>
        <div class="checkout-content">
            <h5 class="fw-bold mb-4" style="color: var(--primary-color)">Siparişi Onayla</h5>
            <div class="row">
                <div class="col-lg-8">
                    <div class="card shadow-sm p-4 border-0 mb-4">
                        <h6 class="fw-bold mb-4" style="color: var(--accent-color)">Teslimat Bilgileri</h6>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="small fw-bold">Ad</label><input type="text" class="form-control"></div>
                            <div class="col-md-6"><label class="small fw-bold">Soyad</label><input type="text" class="form-control"></div>
                            <div class="col-md-4"><label class="small fw-bold">Şehir</label><input type="text" class="form-control"></div>
                            <div class="col-md-4"><label class="small fw-bold">İlçe</label><input type="text" class="form-control"></div>
                            <div class="col-md-4"><label class="small fw-bold">Posta Kodu</label><input type="text" class="form-control"></div>
                            <div class="col-12"><label class="small fw-bold">Adres</label><textarea class="form-control" rows="2"></textarea></div>
                        </div>
                        <h6 class="fw-bold mt-5 mb-3" style="color: var(--accent-color)">Ödeme Yöntemi</h6>
                        <div class="row g-3 text-center mb-4">
                            <div class="col-4"><div class="pay-card active" onclick="switchPay('card', this)"><i class="bi bi-credit-card fs-2"></i><br>Kart</div></div>
                            <div class="col-4"><div class="pay-card" onclick="switchPay('eft', this)"><i class="bi bi-bank fs-2"></i><br>EFT</div></div>
                            <div class="col-4"><div class="pay-card" onclick="switchPay('door', this)"><i class="bi bi-truck fs-2"></i><br>Kapıda</div></div>
                        </div>
                        <div id="pay-card-details" class="method-details active">
                            <input type="text" class="form-control mb-2" placeholder="Kart Numarası">
                            <div class="row g-2"><div class="col-6"><input type="text" class="form-control" placeholder="AA/YY"></div><div class="col-6"><input type="text" class="form-control" placeholder="CVC"></div></div>
                        </div>
                        <div id="pay-eft-details" class="method-details p-3 bg-light rounded">IBAN: TR99 0001 2222 3333 4444 55</div>
                        <div id="pay-door-details" class="method-details"><div class="alert alert-info py-2 small">Kapıda ödeme seçildi.</div></div>
                        <button class="btn btn-user w-100 mt-5 py-3 fw-bold" onclick="notify('Sipariş Alındı!', 'bg-success')">Ödemeyi Bitir (<span class="total-val">0</span> TL)</button>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="total-box-red shadow-sm text-center">
                        <div class="small fw-bold text-uppercase" style="color: var(--primary-color)">Toplam</div>
                        <div class="h3 mb-0 fw-bold"><span class="total-val">0</span> TL</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-page" class="auth-bg">
        <div class="container"><div class="row justify-content-center"><div class="col-xl-10"><div class="card auth-card">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block auth-image-side"></div>
                <div class="col-lg-6 p-5">
                    <div id="login-form">
                        <div class="text-center mb-4"><h1 class="h4 text-gray-900">Tekrar Hoş Geldiniz!</h1></div>
                        <form class="user">
                            <input type="email" class="form-control form-control-user mb-3" placeholder="E-posta...">
                            <input type="password" class="form-control form-control-user mb-4" placeholder="Şifre">
                            <button type="button" class="btn btn-user w-100 mb-3" onclick="showPage('main')">Giriş Yap</button>
                            <hr>
                            <button type="button" class="btn btn-google btn-user w-100 mb-2" onclick="socialLogin('Google')"><i class="bi bi-google me-2"></i> Google</button>
                            <button type="button" class="btn btn-facebook btn-user w-100" onclick="socialLogin('Facebook')"><i class="bi bi-facebook me-2"></i> Facebook</button>
                        </form>
                        <hr><div class="text-center small">
                            <a href="javascript:void(0)" class="text-muted text-decoration-none" onclick="toggleAuth('forgot')">Şifremi Unuttum?</a><br>
                            <a href="javascript:void(0)" class="text-muted text-decoration-none" onclick="toggleAuth('register')">Hesap Oluştur!</a>
                        </div>
                    </div>
                    <div id="register-form" style="display:none"><div class="text-center mb-4"><h1 class="h4 text-gray-900">Hesap Oluştur!</h1></div><form class="user"><input type="email" class="form-control form-control-user mb-3" placeholder="E-posta"><button type="button" class="btn btn-user w-100" onclick="toggleAuth('login')">Kayıt Ol</button></form><hr><div class="text-center small"><a href="javascript:void(0)" class="text-muted text-decoration-none" onclick="toggleAuth('login')">Giriş Yap</a></div></div>
                    <div id="forgot-form" style="display:none"><div class="text-center mb-4"><h1 class="h4 text-gray-900">Şifremi Unuttum</h1></div><form class="user"><input type="email" class="form-control form-control-user mb-3" placeholder="E-posta"><button type="button" class="btn btn-user w-100" onclick="toggleAuth('login')">Sıfırla</button></form><hr><div class="text-center small"><a href="javascript:void(0)" class="text-muted text-decoration-none" onclick="toggleAuth('login')">Giriş Yap</a></div></div>
                </div>
            </div>
        </div></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let count = 0; let total = 0;
        function showPage(p) {
            document.getElementById('main-store').style.display = (p === 'main' ? 'block' : 'none');
            document.getElementById('checkout-page').style.display = (p === 'checkout' ? 'block' : 'none');
            document.getElementById('auth-page').style.display = (p === 'auth' ? 'block' : 'none');
            document.querySelectorAll('.total-val').forEach(el => el.innerText = total);
            window.scrollTo(0,0);
        }
        function toggleAuth(type) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('forgot-form').style.display = 'none';
            document.getElementById(type + '-form').style.display = 'block';
        }
        function switchPay(m, el) {
            document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.method-details').forEach(d => d.classList.remove('active'));
            document.getElementById('pay-' + m + '-details').classList.add('active');
        }
        function addToCart(f) { count++; total += f; document.getElementById('cart-count').innerText = count; notify("✅ Sepete eklendi!", "bg-success"); }
        function socialLogin(p) { notify(`🔄 ${p}'a bağlanılıyor...`, "bg-brown"); setTimeout(() => showPage('main'), 1200); }
        function toggleFav(btn) {
            const icon = btn.querySelector('i');
            if (icon.classList.contains('bi-heart')) {
                icon.className = 'bi bi-heart-fill';
                notify("❤️ Favorilere eklendi!", "bg-danger");
            } else {
                icon.className = 'bi bi-heart';
                notify("💔 Çıkarıldı.", "bg-secondary");
            }
        }
        function notify(msg, color) {
            const el = document.getElementById('liveToast');
            document.getElementById('toastMsg').innerText = msg;
            el.className = `toast align-items-center text-white border-0 shadow ${color}`;
            new bootstrap.Toast(el).show();
        }
    </script>
</body>
</html>
